version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: frbeams_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: frbeams
      MYSQL_USER: frbeams_user
      MYSQL_PASSWORD: frbeams_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_setup.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - frbeams_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache (optional, for session storage)
  redis:
    image: redis:7-alpine
    container_name: frbeams_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - frbeams_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # FRBEAMS Application
  frbeams:
    build: .
    container_name: frbeams_app
    environment:
      DATABASE_URL: mysql+pymysql://frbeams_user:frbeams_password@mysql:3306/frbeams
      SECRET_KEY: your-production-secret-key-change-this
      FLASK_ENV: production
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frbeams_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      timeout: 30s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: frbeams_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frbeams
    networks:
      - frbeams_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  frbeams_network:
    driver: bridge
